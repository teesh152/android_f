name: Build TubeExplorer APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Installs Gradle directly on the runner, so NO gradle wrapper
      # binary (gradle-wrapper.jar) needs to be uploaded to the repo.
      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p apk
          cp app/build/outputs/apk/debug/app-debug.apk apk/TubeExplorer.apk

      # Option 1: download the APK from the Actions run page (Artifacts)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TubeExplorer-APK
          path: apk/TubeExplorer.apk

      # Option 2: commit the APK back into the repo (apk/ folder)
      # so it can be downloaded straight from the GitHub file browser.
      - name: Commit APK to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f apk/TubeExplorer.apk
          git commit -m "CI: build APK [skip ci]" || echo "No changes to commit"
          git push
